<!DOCTYPE html>
<html lang="en">
<head>
<script>/* RF theme init — prevents flash */
(function(){var t=localStorage.getItem('rf-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Reffine MENA Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0b0d; --surface: #111316; --border: rgba(255,255,255,0.08);
  --border-hov: rgba(255,255,255,0.16); --text: #f0f0f0; --text-2: #8a8e9c;
  --text-3: rgba(138,142,156,0.5); --accent: #00d084; --accent-dim: rgba(0,208,132,0.1);
  --red: #e8424a; --red-dim: rgba(232,66,74,0.1);
}
html, body { height: 100%; }
body {
  font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh;
  background-image: radial-gradient(ellipse at 50% 0%, rgba(0,208,132,0.07) 0%, transparent 60%);
}

.login-wrap {
  width: 100%; max-width: 380px; padding: 1.5rem;
}

.logo-block {
  text-align: center; margin-bottom: 2rem;
}
.logo-name {
  font-size: 1.05rem; font-weight: 700; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--text);
}
.logo-name span { color: var(--accent); }
.logo-sub {
  font-size: 0.6rem; font-weight: 500; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--text-3); margin-top: 5px;
}

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 2rem 2rem 1.75rem;
  box-shadow: 0 24px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.03);
}
.card-title {
  font-size: 0.62rem; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text-3);
  text-align: center; margin-bottom: 1.75rem;
}

.field { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 1rem; }
.field:last-of-type { margin-bottom: 1.5rem; }
.field label {
  font-size: 0.54rem; font-weight: 700; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--text-3);
}
.field input {
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-family: inherit;
  font-size: 0.82rem; padding: 0.65rem 0.85rem; outline: none;
  transition: border-color 0.15s, background 0.15s; width: 100%;
}
.field input:focus {
  border-color: var(--accent);
  background: rgba(0,208,132,0.04);
}
.field input::placeholder { color: var(--text-3); }

.error-msg {
  display: none; font-size: 0.65rem; color: var(--red);
  background: var(--red-dim); border: 1px solid rgba(232,66,74,0.22);
  border-radius: 5px; padding: 0.55rem 0.85rem; text-align: center;
  margin-bottom: 1rem;
}

.btn-login {
  width: 100%; background: var(--accent); color: #000; border: none;
  border-radius: 6px; padding: 0.7rem; font-family: inherit;
  font-size: 0.75rem; font-weight: 700; letter-spacing: 0.06em;
  cursor: pointer; transition: opacity 0.15s, transform 0.1s;
}
.btn-login:hover { opacity: 0.88; }
.btn-login:active { transform: scale(0.98); }

.back-link {
  display: block; text-align: center; margin-top: 1.25rem;
  font-size: 0.62rem; color: var(--text-3); text-decoration: none;
  transition: color 0.15s;
}
.back-link:hover { color: var(--text-2); }

/* Shake animation on wrong password */
@keyframes shake {
  0%,100%{ transform: translateX(0); }
  20%{ transform: translateX(-8px); }
  40%{ transform: translateX(8px); }
  60%{ transform: translateX(-5px); }
  80%{ transform: translateX(5px); }
}
.shake { animation: shake 0.4s ease; }

.login-theme-btn {
  position: fixed; top: 1rem; right: 1rem;
  width: 32px; height: 32px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 7px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: #8a8e9c; transition: all 0.15s; z-index: 100;
}
.login-theme-btn:hover { border-color: rgba(255,255,255,0.22); color: #f5f5f5; background: rgba(255,255,255,0.08); }
.login-theme-btn .icon-sun  { display: none; }
.login-theme-btn .icon-moon { display: block; }
[data-theme="light"] .login-theme-btn { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.13); color: #545b6b; }
[data-theme="light"] .login-theme-btn:hover { border-color: rgba(0,0,0,0.22); color: #1a1d23; background: rgba(0,0,0,0.07); }
[data-theme="light"] .login-theme-btn .icon-sun  { display: block; }
[data-theme="light"] .login-theme-btn .icon-moon { display: none; }

[data-theme="light"] {
  --bg: #f0f2f5; --surface: #ffffff;
  --border: rgba(0,0,0,0.09); --border-hov: rgba(0,0,0,0.18);
  --text: #1a1d23; --text-2: #545b6b; --text-3: rgba(84,91,107,0.65);
  --accent: #009d64; --accent-dim: rgba(0,157,100,0.1);
  --red: #c0392b; --red-dim: rgba(192,57,43,0.1);
  color-scheme: light;
}
[data-theme="light"] body { background: var(--bg) !important; background-image: radial-gradient(ellipse at 50% 0%, rgba(0,157,100,0.07) 0%, transparent 60%) !important; }
[data-theme="light"] .card { background: var(--surface) !important; border-color: var(--border) !important; box-shadow: 0 24px 60px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.04) !important; }
[data-theme="light"] .field input { background: rgba(0,0,0,0.03) !important; border-color: var(--border) !important; }
[data-theme="light"] .field input:focus { border-color: var(--accent) !important; }
[data-theme="light"] .logo-name { color: var(--text) !important; }
[data-theme="light"] .login-err { background: var(--red-dim) !important; border-color: rgba(192,57,43,0.25) !important; }

</style>
</head>
<body>
<button class="login-theme-btn" id="rfThemeBtn" aria-label="Toggle theme" title="Toggle light/dark">
  <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
</button>


<div class="login-wrap">
  <div class="logo-block">
    <div class="logo-name">REFFINE <span>·</span> MENA</div>
    <div class="logo-sub">Admin Panel</div>
  </div>

  <div class="card" id="loginCard">
    <div class="card-title">Sign in to continue</div>

    <div class="field">
      <label>Username</label>
      <input type="text" id="u" placeholder="admin" autocomplete="username" spellcheck="false">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="p" placeholder="••••••••" autocomplete="current-password">
    </div>

    <div class="error-msg" id="errMsg">Incorrect username or password</div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>
  </div>

  <a href="index.html" class="back-link">← Back to dashboard</a>
</div>

<script>
var STORE_AUTH = 'rf_admin_auth';
var DEFAULT_USER = 'admin';
var DEFAULT_PASS = 'reffine2026';

function hashPass(p) { return btoa('rf::' + p + '::mena'); }

function getAuth() {
  try { return JSON.parse(localStorage.getItem(STORE_AUTH) || 'null'); }
  catch(e) { return null; }
}

// Init default credentials if first run
if (!getAuth()) {
  localStorage.setItem(STORE_AUTH, JSON.stringify({ user: DEFAULT_USER, passHash: hashPass(DEFAULT_PASS) }));
}

// Already logged in? Skip straight to admin
if (sessionStorage.getItem('rf_admin_session')) {
  window.location.replace('admin.html');
}

function doLogin() {
  var u = document.getElementById('u').value.trim();
  var p = document.getElementById('p').value;
  var errEl = document.getElementById('errMsg');
  var card  = document.getElementById('loginCard');
  var auth  = getAuth();

  errEl.style.display = 'none';

  if (!u || !p) {
    errEl.textContent = 'Please enter your username and password';
    errEl.style.display = 'block';
    return;
  }

  if (u === auth.user && hashPass(p) === auth.passHash) {
    sessionStorage.setItem('rf_admin_session', u);
    document.getElementById('loginBtn').textContent = 'Signing in…';
    setTimeout(function() { window.location.replace('admin.html'); }, 200);
  } else {
    errEl.textContent = 'Incorrect username or password';
    errEl.style.display = 'block';
    document.getElementById('p').value = '';
    card.classList.remove('shake');
    void card.offsetWidth; // reflow
    card.classList.add('shake');
    document.getElementById('p').focus();
  }
}

// Enter key submits
document.getElementById('p').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
document.getElementById('u').addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('p').focus(); });
// Auto-focus username
document.getElementById('u').focus();
</script>

<script>
// Theme toggle
(function(){
  var html = document.documentElement;
  function applyTheme(t){ html.setAttribute('data-theme',t); localStorage.setItem('rf-theme',t); }
  var btn = document.getElementById('rfThemeBtn');
  if(btn) btn.addEventListener('click', function(){
    applyTheme(html.getAttribute('data-theme')==='light' ? 'dark' : 'light');
  });
})();
</script>
</body>
</html>
